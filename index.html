<!DOCTYPE html>
<html lang="en">
<head>
    <style>
  body {
    margin: 0;
    padding: 2rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #ffffff;
    background-color: #0b0c10; /* Premium Dark Background */
    position: relative;
    min-height: 100vh;
  }

  /* This creates the beautiful UI glow effects behind your text */
  body::before, body::after {
    content: "";
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    z-index: -1; /* Puts it safely behind your text */
  }

  /* Top right neon blue glow */
  body::before {
    top: -10%;
    right: -10%;
    background: #4f46e5; 
  }

  /* Bottom left neon purple glow */
  body::after {
    bottom: -10%;
    left: -10%;
    background: #7c3aed;
  }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indira Priyadharshini | Portfolio</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
        }
        /* Custom styling to make markdown elements look beautiful in Dark Mode */
        .prose h1 { color: #f8fafc; font-size: 2.25rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid #1e293b; padding-bottom: 0.5rem; }
        .prose h2 { color: #38bdf8; font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .prose h3 { color: #f1f5f9; font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; }
        .prose p { color: #94a3b8; line-height: 1.75; margin-bottom: 1rem; }
        .prose a { color: #38bdf8; text-decoration: none; transition: color 0.2s; }
        .prose a:hover { color: #7dd3fc; text-decoration: underline; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #94a3b8; }
        .prose li { margin-bottom: 0.5rem; }
        .prose img { display: inline-block; margin: 0.5rem 0; border-radius: 0.375rem; }
        /* Smooth glowing glassmorphism effect */
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-sky-500 selection:text-white">

    <!-- Decorative background glow blobs -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-sky-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="max-w-4xl mx-auto px-4 py-12 relative z-10">
        <!-- Header / Brand -->
        <header class="flex justify-between items-center mb-12 pb-6 border-b border-slate-800">
            <div class="flex items-center gap-2">
                <div class="h-3 w-3 rounded-full bg-emerald-400 animate-pulse"></div>
                <span class="text-sm font-medium tracking-wider text-slate-400 uppercase">Available for Projects</span>
            </div>
            <a href="https://github.com/Indira-Priyadharshini" target="_blank" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-1.5 rounded-full transition font-medium border border-slate-700/50">
                GitHub Profile ↗
            </a>
        </header>

        <!-- Main Content Card -->
        <main class="glass-card rounded-2xl p-8 md:p-12 shadow-2xl shadow-black/40">
            <div id="content" class="prose max-w-none space-y-4">
                <!-- Loading State -->
                <div class="flex flex-col items-center justify-center py-20 space-y-4">
                    <div class="w-8 h-8 border-4 border-sky-400 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-slate-400 text-sm tracking-wide">Assembling your portfolio experience...</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-12 text-center text-xs text-slate-500 tracking-wide">
            &copy; 2026 Indira Priyadharshini. Built dynamically from GitHub.
        </footer>
    </div>

    <!-- Markdown Parser Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Configure marked to handle icons/images cleanly
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                // Parse markdown and inject into the beautiful container
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = `
                    <div class="text-center text-red-400 py-10">
                        <p class="font-semibold">Oops! Failed to load portfolio content.</p>
                        <p class="text-xs text-slate-500 mt-1">Make sure README.md exists in your repository root.</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
